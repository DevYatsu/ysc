<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>YatsuScript WASM Test</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
    textarea { width: 100%; font-family: monospace; font-size: 14px; }
    #output { background: #f5f5f5; padding: 1rem; border-radius: 4px; white-space: pre-wrap; }
    button { padding: 0.5rem 1rem; font-size: 16px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>YatsuScript WASM Test</h1>
  <textarea id="src" rows="8">print("Hello from WASM!")
print("fib(10) = " + str(fib(10)))

fun fib(n) {
  if n < 2 {
    ret n
  } else {
    ret fib(n - 1) + fib(n - 2)
  }
}
</textarea>
  <br>
  <button id="run">Run</button>
  <h3>Output:</h3>
  <pre id="output"></pre>

  <script type="module">
    import init, { _eval as ys_eval } from '../pkg/ys_wasm.js';

    const $src = document.getElementById('src');
    const $out = document.getElementById('output');
    const $btn = document.getElementById('run');

    async function main() {
      await init();
      $btn.disabled = false;

      $btn.onclick = () => {
        $out.textContent = 'Running...';
        try {
          const result = ys_eval($src.value);
          $out.textContent = result;
        } catch (e) {
          $out.textContent = 'Error: ' + e.message;
        }
      };
    }

    $btn.disabled = true;
    main();
  </script>
</body>
</html>
