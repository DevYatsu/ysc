<style>
nav .logo .hide-mobile { display: inline; }
@media (max-width: 480px) { nav .logo .hide-mobile { display: none; } }

.playground-wrap {
  display: flex;
  gap: var(--space-4);
  height: 70vh;
  margin: var(--space-6) 0;
}

.playground-editor {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  background: var(--surface-1);
  border: 1px solid var(--surface-3);
  border-radius: var(--radius-lg);
  overflow: hidden;
}

#editor-container { flex: 1; }

.playground-output {
  width: 55%;
  min-width: 400px;
  display: flex;
  flex-direction: column;
  background: var(--surface-1);
  border: 1px solid var(--surface-3);
  border-radius: var(--radius-lg);
  overflow: hidden;
}

.playground-output .output-content {
  flex: 1;
  overflow: auto;
  padding: var(--space-4);
  font-family: var(--mono);
  font-size: 0.8rem;
  line-height: 1.6;
  white-space: pre;
  color: var(--text);
  max-height: calc(70vh - 80px);
}

.playground-output .output-content.is-wrapped {
  white-space: pre-wrap;
}

.playground-bar {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  padding: var(--space-3) var(--space-4);
  background: var(--surface-2);
  border-bottom: 1px solid var(--surface-3);
}

.playground-bar .status {
  font-size: 0.8rem;
  color: var(--text-tertiary);
  margin-left: auto;
}

.playground-tabs {
  display: flex;
  background: var(--surface-2);
  border-bottom: 1px solid var(--surface-3);
}

.playground-tab {
  padding: var(--space-2) var(--space-4);
  font-size: 0.8rem;
  font-weight: 500;
  cursor: pointer;
  color: var(--text-tertiary);
  border-bottom: 2px solid transparent;
  transition: all var(--transition-fast);
  user-select: none;
}
.playground-tab:hover { color: var(--text-secondary); }
.playground-tab.active { color: var(--brand); border-bottom-color: var(--brand); }

.output-entry {
  display: flex;
  align-items: baseline;
  gap: 0.75rem;
  padding: 0.35rem 0;
  border-bottom: 1px solid #21262d;
}
.output-entry:last-child { border-bottom: none; }
.output-entry .output-src {
  margin-left: auto;
  flex-shrink: 0;
  font-size: 0.6rem;
  color: #3a3f4b;
  user-select: none;
  font-weight: 400;
  font-family: var(--mono);
}
.output-entry .output-val { color: var(--text); word-break: break-all; }
.error-text { color: var(--red); }

/* ── Bytecode layout ─── */
.bc-wrap { font-family: var(--mono); font-size: 0.78rem; }
.bc-fn {
  display: flex; align-items: baseline; gap: 0.75rem;
  margin: 0.75rem 0 0.25rem; padding-bottom: 0.25rem;
  border-bottom: 1px solid var(--surface-3);
}
.bc-fn:first-child { margin-top: 0; }
.bc-fn-name { color: #569cd6; font-weight: 600; }
.bc-fn-meta { color: #484f58; font-size: 0.7rem; }
.bc-row {
  display: flex; align-items: baseline; gap: 0.5rem;
  padding: 0.1rem 0;
  border-radius: 3px;
}
.bc-row[data-line] { cursor: pointer; }
.bc-row:hover { background: rgba(255,255,255,0.03); }
.bc-idx {
  flex-shrink: 0; min-width: 2.2em; text-align: right;
  color: #484f58; font-size: 0.7rem; user-select: none;
}
.bc-op { color: #c586c0; }
.bc-rest { color: var(--text-secondary); }
.bc-rest .bc-num { color: #79c0ff; }
.bc-loc {
  cursor: pointer; color: #58a6ff; font-size: 0.7rem;
  border-bottom: 1px dashed #1f3a5a;
  margin-left: 0.25rem;
  user-select: none;
}
.bc-loc:hover { color: #79c0ff; border-bottom-color: #58a6ff; }

@media (max-width: 768px) {
  .playground-wrap { flex-direction: column; }
  .playground-output { width: 100%; min-height: 300px; }
}

<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.0/min/vs/loader.js"></script>
<script>
// ── Monarch tokenizer for ysc ──────────────────────────
const yscLanguage = {
  defaultToken: '', tokenPostfix: '.ys', ignoreCase: false,
  keywords: ['fun','ret','if','else','for','while','in','and','or','not',
    'nil','true','false','async','await','exp','use','switch',
    'break','move','except','fail','error','yield'],
  operators: ['+=','-=','*=','/=','%=','+','-','*','/','%',
    '==','!=','<','<=','>','>=','=',':','..','->','|','!',',',';','.'],
  symbols: /[=><!~?:&|+\-*\/^%]+/,
  escapes: /\\(?:[abfnrtv\\"']|x[0-9A-Fa-f]{1,4}|u[0-9A-Fa-f]{4}|U[0-9A-Fa-f]{8})/,
  tokenizer: {
    root: [
      [/\/\/.*$/, 'comment'], [/#.*$/, 'comment'],
      [/"/, { token: 'string.quote', bracket: '@open', next: '@string' }],
      [/\d+[eE][+-]?\d+/, 'number.float'],
      [/\d+\.\d+([eE][+-]?\d+)?/, 'number.float'],
      [/\d+/, 'number'],
      [/[a-zA-Z_$][\w$]*/, { cases: { '@keywords': 'keyword', '@default': 'identifier' } }],
      [/[{}()\[\]]/, '@brackets'], [/[.]/, 'delimiter'], [/[;,.]/, 'delimiter'],
      [/@symbols/, { cases: { '@operators': 'operator', '@default': '' } }],
      { include: '@whitespace' },
    ],
    string: [
      [/[^\\"]+/, 'string'], [/@escapes/, 'string.escape'],
      [/\\./, 'string.escape.invalid'],
      [/"/, { token: 'string.quote', bracket: '@close', next: '@pop' }],
    ],
    whitespace: [[/[ \t\r\n]+/, 'white']],
  },
};

// ── Default code ───────────────────────────────────────
const DEFAULT_CODE = `// ysc — interactive demo

fun fib(n) {
  if n < 2 { ret n }
  else { ret fib(n - 1) + fib(n - 2) }
}

print("fib(10) = " + fib(10))

// Object iteration
obj = {name: "Alice", age: 30, city: "Paris"}
for k in obj {
  print(k + ": " + str(obj[k]))
}

// Range iteration
sum = 0
for i in 0..10 {
  sum = sum + i
}
print("sum 0..9 = " + sum)
`;

// ── Bootstrap ──────────────────────────────────────────
const $out = document.getElementById('output');
const $runBtn = document.getElementById('runBtn');
const $resetBtn = document.getElementById('resetBtn');
const $formatBtn = document.getElementById('formatBtn');
const $status = document.getElementById('status');
const $tabOut = document.getElementById('tabOut');
const $tabAst = document.getElementById('tabAst');
const $tabBc = document.getElementById('tabBc');

let editor, wasm, currentTab = 'output', lastOutput = '';

require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.52.0/min/vs' } });

require(['vs/editor/editor.main'], async function () {
  // Register ysc language
  monaco.languages.register({ id: 'ysc' });
  monaco.languages.setMonarchTokensProvider('ysc', yscLanguage);

  // Custom dark theme matching the website
  monaco.editor.defineTheme('ysc-dark', {
    base: 'vs-dark',
    inherit: true,
    rules: [
      { token: 'keyword', foreground: 'ff7b72' },
      { token: 'string', foreground: 'a5d6ff' },
      { token: 'string.quote', foreground: 'a5d6ff' },
      { token: 'number', foreground: '79c0ff' },
      { token: 'number.float', foreground: '79c0ff' },
      { token: 'comment', foreground: '8b949e', fontStyle: 'italic' },
      { token: 'identifier', foreground: 'e6edf3' },
      { token: 'delimiter', foreground: '8b949e' },
      { token: 'operator', foreground: 'ffa657' },
    ],
    colors: {
      'editor.background': '#0d1117',
      'editor.foreground': '#e6edf3',
      'editor.lineHighlightBackground': '#161b22',
      'editor.selectionBackground': '#1c2333',
      'editorCursor.foreground': '#569cd6',
      'editorLineNumber.foreground': '#6e7681',
      'editorIndentGuide.background': '#252d3f',
    },
  });

  // Create editor
  editor = monaco.editor.create(document.getElementById('editor-container'), {
    value: DEFAULT_CODE,
    language: 'ysc',
    theme: 'ysc-dark',
    fontSize: 14,
    lineNumbers: 'on',
    minimap: { enabled: false },
    scrollBeyondLastLine: false,
    automaticLayout: true,
    tabSize: 2,
    wordWrap: 'on',
    scrollbar: { verticalScrollbarSize: 8, horizontalScrollbarSize: 8 },
  });

  // Autocomplete
  monaco.languages.registerCompletionItemProvider('ysc', {
    provideCompletionItems: (model, position) => {
      const range = model.getWordUntilPosition(position);
      const r = { startLineNumber: position.lineNumber, endLineNumber: position.lineNumber,
        startColumn: range.startColumn, endColumn: range.endColumn };
      const kw = ['fun','ret','if','else','for','while','in','and','or','not',
        'nil','true','false','async','await','exp','use','switch','break','move','except','fail','error','yield'];
      const builtins = [
        {label:'print',detail:'print(...values)'},{label:'str',detail:'str(value)'},
        {label:'len',detail:'len(value)'},{label:'time',detail:'time()'},
        {label:'sleep',detail:'sleep(ms)'},{label:'fetch',detail:'fetch(url)'},{label:'spawn',detail:'spawn(fn,...)'}];
      const strM = ['len','upper','lower','trim','starts_with','ends_with','contains',
        'replace','split','repeat','slice','index_of','to_number','is_empty','chars'];
      const numM = ['to_string','ceil','floor','round','abs','sqrt','pow','is_integer','to_int'];
      const objM = ['keys','values','entries','has'];
      const listM = ['map','filter','reduce','each','find','some','every','flat_map',
        'includes','index_of','sorted','reversed','slice','concat','flatten','take','drop','unique'];
      return { suggestions: [
        ...kw.map(k => ({ label: k, kind: monaco.languages.CompletionItemKind.Keyword, insertText: k, range: r })),
        ...builtins.map(f => ({ label: f.label, kind: monaco.languages.CompletionItemKind.Function, insertText: f.label, detail: f.detail, range: r })),
        ...strM.map(m => ({ label: m, kind: monaco.languages.CompletionItemKind.Method, insertText: m, detail: 'string.'+m+'()', range: r })),
        ...numM.map(m => ({ label: m, kind: monaco.languages.CompletionItemKind.Method, insertText: m, detail: 'number.'+m+'()', range: r })),
        ...objM.map(m => ({ label: m, kind: monaco.languages.CompletionItemKind.Method, insertText: m, detail: 'object.'+m+'()', range: r })),
        ...listM.map(m => ({ label: m, kind: monaco.languages.CompletionItemKind.Method, insertText: m, detail: 'list.'+m+'()', range: r })),
      ]};
    },
  });

  // Hover provider
  monaco.languages.registerHoverProvider('ysc', {
    provideHover: (model, position) => {
      const w = model.getWordAtPosition(position);
      if (!w) return null;
      const docs = {
        'fun': 'Declare a function.\n\n```ys\nfun name(params) { body }\n```',
        'ret': 'Return a value.\n\n```ys\nret expr\n```',
        'if': 'Conditional branch.\n\n```ys\nif cond { ... } else { ... }\n```',
        'for': 'Loop over an iterable.\n\n```ys\nfor var in iter { ... }\n```',
        'while': 'Loop while condition is true.',
        'print': 'Output values.\n\n```ys\nprint("hello", 42)\n```',
        'str': 'Convert to string.\n\n```ys\nstr(42) → "42"\n```',
        'len': 'Get length.\n\n```ys\nlen("hi") → 2\n```',
        'yield': 'Generator keyword (future).',
      };
      if (docs[w.word]) return { contents: [{ value: docs[w.word] }] };
      return null;
    },
  });

  // Load WASM
  try {
    const wasmMod = await import('./pkg/ys_wasm.js');
    await wasmMod.default();
    wasm = wasmMod;
    $status.textContent = 'Ready';
    $runBtn.disabled = false;
  } catch (e) {
    $status.textContent = 'Unavailable';
    $out.innerHTML = '<span class="error-text">WASM module not loaded.\n\n' + e.message + '</span>';
  }
});

// ── Tab switching ──────────────────────────────────────
function showTab(tab) {
  currentTab = tab;
  [$tabOut, $tabAst, $tabBc].forEach(t => t.classList.remove('active'));
  if (tab === 'output') { $tabOut.classList.add('active'); $out.innerHTML = lastOutput || ''; }
  if (tab === 'ast') { $tabAst.classList.add('active'); if (wasm && editor) refresh(); }
  if (tab === 'bytecode') { $tabBc.classList.add('active'); if (wasm && editor) refresh(); }
  $out.classList.toggle('is-wrapped', tab !== 'bytecode');
}

$tabOut.onclick = () => showTab('output');
$tabAst.onclick = () => showTab('ast');
$tabBc.onclick = () => showTab('bytecode');

function refresh() {
  if (!wasm || !editor) return;
  try {
    const src = editor.getValue();
    if (currentTab === 'ast') showAst(src);
    else if (currentTab === 'bytecode') showBytecode(src);
  } catch (e) {
    $out.innerHTML = '<span class="error-text">' + escape(e.message) + '</span>';
  }
}

function escape(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function formatLine(l) {
  const val = escape(l.value || '');
  let html = '<div class="output-entry">';
  html += '<span class="output-val">' + val + '</span>';
  if (l.line !== undefined) {
    html += '<span class="output-src">' + l.line + '</span>';
  }
  html += '</div>';
  return html;
}

function runCode(src) {
  const r = wasm._eval(src);
  if (r.success) {
    const lines = r.lines || [];
    lastOutput = lines.length ? lines.map(formatLine).join('\n') : '';
  } else {
    let html = '';
    (r.lines || []).forEach(l => { html += formatLine(l) + '\n'; });
    html += '<span class="error-text">' + escape(r.error || 'Error') + '</span>';
    lastOutput = html;
  }
  $out.innerHTML = lastOutput;
}

// ── Go to a source line/col in Monaco ──────────────────
function goToSource(line, col) {
  if (!editor) return;
  col = col || 1;
  line = Math.max(1, Math.min(line, editor.getModel().getLineCount()));
  editor.revealPositionInCenter({ lineNumber: line, column: col });
  editor.setSelection({ startLineNumber: line, startColumn: col,
    endLineNumber: line, endColumn: col + 1 });
  editor.focus();
}

// ── AST tree (collapsible, clickable) ──────────────────
let astIdCounter = 0;

function showAst(src) {
  const r = wasm._parseAst(src);
  if (r.success) {
    astIdCounter = 0;
    $out.innerHTML = renderAstNode(r.data, 0, true);
    // Attach click handlers for collapse toggles
    $out.querySelectorAll('.ast-toggle').forEach(el => {
      el.onclick = (e) => {
        e.stopPropagation();
        const target = el.parentNode.querySelector('.ast-children');
        if (target) {
          const expanded = target.style.display !== 'none';
          target.style.display = expanded ? 'none' : '';
          el.textContent = expanded ? '▶' : '▼';
        }
      };
    });
    // Attach click handlers for source navigation
    $out.querySelectorAll('.ast-line').forEach(el => {
      el.onclick = () => {
        const l = parseInt(el.dataset.line, 10);
        const c = parseInt(el.dataset.col, 10);
        if (!isNaN(l)) goToSource(l, c);
      };
    });
  } else {
    $out.innerHTML = '<span class="error-text">' + escape(r.error || 'Error') + '</span>';
  }
}

function renderAstNode(obj, depth, expanded) {
  const id = ++astIdCounter;
  if (obj === null || obj === undefined)
    return '<span style="color:#8b949e;">null</span>';
  if (typeof obj === 'string')
    return '<span style="color:#a5d6ff;">"' + escape(obj) + '"</span>';
  if (typeof obj === 'number')
    return '<span style="color:#79c0ff;">' + obj + '</span>';
  if (typeof obj === 'boolean')
    return '<span style="color:#ff7b72;">' + obj + '</span>';

  if (Array.isArray(obj)) {
    if (obj.length === 0) return '<span style="color:#8b949e;">[]</span>';
    let items = '';
    obj.forEach((item, i) => {
      items += '<div style="padding-left:1em;">' + renderAstNode(item, depth + 1, false) + '</div>';
    });
    const toggle = expanded ? '▼' : '▶';
    const display = expanded ? '' : 'none';
    return '<div><span class="ast-toggle" style="cursor:pointer;user-select:none;color:#8b949e;">' + toggle + '</span>'
      + '<span style="color:#8b949e;">Array[' + obj.length + ']</span>'
      + '<div class="ast-children" style="display:' + display + ';">' + items + '</div></div>';
  }

  if (typeof obj === 'object') {
    const keys = Object.keys(obj);
    if (keys.length === 0) return '<span style="color:#8b949e;">{}</span>';

    // Extract line/col for source navigation
    const line = obj.line, col = obj.col;

    // Build a summary string for the collapsed state
    const typeLabel = obj.type || keys[0];
    let summary = typeLabel;
    if (keys.length <= 3 && !obj.line && !obj.col) {
      // Small object: inline
      let parts = '';
      keys.forEach((k, i) => {
        if (k === 'line' || k === 'col') return;
        const v = obj[k];
        parts += (i > 0 ? ', ' : '') + k + ': ' + (typeof v === 'object' ? '{...}' : v);
      });
      summary = keys[0] + ' {' + parts + '}';
    }

    let html = '<div class="ast-object" style="cursor:default;">';
    if (keys.length <= 3 && !line) {
      // Small inline object — no toggle
      html += '<span style="color:#569cd6;">' + typeLabel + '</span>';
      html += ' { ';
      keys.forEach((k, i) => {
        if (k === 'line' || k === 'col' || k === 'type') return;
        if (i > 0) html += ', ';
        html += '<span style="color:#d2a8ff;">' + k + '</span>: ' + renderAstNode(obj[k], depth+1, false);
      });
      html += ' }';
    } else {
      // Collapsible — start collapsed
      html += '<span class="ast-toggle" style="cursor:pointer;user-select:none;color:#8b949e;">▶</span> ';
      if (line) {
        html += '<span class="ast-line" data-line="' + line + '" data-col="' + (col||1) + '"'
          + ' style="cursor:pointer;border-bottom:1px dashed #3a3a50;">';
        html += '<span style="color:#569cd6;">' + typeLabel + '</span>';
        html += '</span>';
      } else {
        html += '<span style="color:#569cd6;">' + typeLabel + '</span>';
      }
      html += '<div class="ast-children" style="display:none;">';
      keys.forEach(k => {
        if (k === 'line' || k === 'col') return;
        const val = obj[k];
        const keyColor = k === 'type' ? '#569cd6' : '#d2a8ff';
        html += '<div style="padding-left:1em;">';
        html += '<span style="color:' + keyColor + ';">' + k + '</span>: ' + renderAstNode(val, depth+1, false);
        html += '</div>';
      });
      html += '</div>';
    }
    html += '</div>';
    return html;
  }
  return escape(String(obj));
}

// ── Bytecode (colored, clickable, table-like) ──────────
function showBytecode(src) {
  const r = wasm._disassemble(src);
  if (r.success) {
    let html = '<div class="bc-wrap">';
    (r.functions || []).forEach(fn => {
      html += '<div class="bc-fn"><span class="bc-fn-name">fn ' + escape(fn.name) + '</span>'
        + '<span class="bc-fn-meta">' + fn.params + ' params, ' + fn.locals + ' locals</span></div>';
      (fn.instructions || []).forEach((ins, i) => {
        const loc = extractLoc(ins);
        const lineAttr = loc ? ' data-line="' + loc.line + '" data-col="' + loc.col + '"' : '';
        html += '<div class="bc-row"' + lineAttr + '>'
          + '<span class="bc-idx">' + i + '</span>'
          + colorInstruction(ins) + '</div>';
      });
    });
    html += '<div class="bc-fn"><span class="bc-fn-name">main</span></div>';
    (r.main || []).forEach((ins, i) => {
      const loc = extractLoc(ins);
      const lineAttr = loc ? ' data-line="' + loc.line + '" data-col="' + loc.col + '"' : '';
      html += '<div class="bc-row"' + lineAttr + '>'
        + '<span class="bc-idx">' + i + '</span>'
        + colorInstruction(ins) + '</div>';
    });
    html += '</div>';
    $out.innerHTML = html;
  } else {
    $out.innerHTML = '<span class="error-text">' + escape(r.error || 'Error') + '</span>';
  }
}

function extractLoc(ins) {
  const m = ins.match(/Loc\s*\{\s*line:\s*(\d+)\s*,\s*col:\s*(\d+)\s*\}/);
  if (m) return { line: parseInt(m[1], 10), col: parseInt(m[2], 10) };
  return null;
}

function colorInstruction(ins) {
  const opcode = ins.match(/^(\w+)/);
  if (!opcode) return escape(ins);
  const op = opcode[0];
  let rest = ins.slice(op.length);

  // Remove Loc from display — it's attached to the row
  rest = rest.replace(/Loc\s*\{\s*line:\s*\d+\s*,\s*col:\s*\d+\s*\}/, '');

  rest = rest.replace(/(\b\d+\b)/g, '<span class="bc-num">$1</span>');
  return '<span class="bc-op">' + op + '</span>'
    + '<span class="bc-rest">' + rest + '</span>';
}

// Attach bytecode click handlers after rendering
$out.addEventListener('click', (e) => {
  const row = e.target.closest('.bc-row');
  if (row) {
    const line = parseInt(row.dataset.line, 10);
    const col = parseInt(row.dataset.col, 10);
    if (!isNaN(line)) goToSource(line, col || 1);
  }
});

$runBtn.onclick = () => { showTab('output'); if (editor) runCode(editor.getValue()); };
$resetBtn.onclick = () => { if (editor) editor.setValue(DEFAULT_CODE); };
$formatBtn.onclick = () => {
  if (!editor || !wasm) return;
  const formatted = wasm._format(editor.getValue());
  editor.setValue(formatted);
  $status.textContent = 'Formatted';
  setTimeout(() => { $status.textContent = ''; }, 2000);
};
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault(); $runBtn.click();
  }
});
</script>
</body>
</html>
