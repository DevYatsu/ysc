<!DOCTYPE html>

<title>Playground — ysc</title>
<link rel="stylesheet" href="css/style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23569cd6'/><text x='16' y='22' font-size='18' font-weight='bold' fill='black' text-anchor='middle'>y</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;550;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" data-name="vs/editor/editor.min.css" href="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.0/min/vs/editor/editor.min.css">
<style>
nav .logo .hide-mobile { display: inline; }
@media (max-width: 480px) { nav .logo .hide-mobile { display: none; } }

.playground-wrap {
  display: flex;
  gap: var(--space-4);
  min-height: 65vh;
  margin: var(--space-6) 0;
}

.playground-editor {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  background: var(--surface-1);
  border: 1px solid var(--surface-3);
  border-radius: var(--radius-lg);
  overflow: hidden;
}

#editor-container { flex: 1; }

.playground-output {
  width: 45%;
  min-width: 360px;
  display: flex;
  flex-direction: column;
  background: var(--surface-1);
  border: 1px solid var(--surface-3);
  border-radius: var(--radius-lg);
  overflow: hidden;
}

.playground-output .output-content {
  flex: 1;
  overflow: auto;
  padding: var(--space-4);
  font-family: var(--mono);
  font-size: 0.8rem;
  line-height: 1.6;
  white-space: pre;
  color: var(--text);
}

.playground-output .output-content.is-wrapped {
  white-space: pre-wrap;
}

.playground-bar {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  padding: var(--space-3) var(--space-4);
  background: var(--surface-2);
  border-bottom: 1px solid var(--surface-3);
}

.playground-bar .status {
  font-size: 0.8rem;
  color: var(--text-tertiary);
  margin-left: auto;
}

.playground-tabs {
  display: flex;
  background: var(--surface-2);
  border-bottom: 1px solid var(--surface-3);
}

.playground-tab {
  padding: var(--space-2) var(--space-4);
  font-size: 0.8rem;
  font-weight: 500;
  cursor: pointer;
  color: var(--text-tertiary);
  border-bottom: 2px solid transparent;
  transition: all var(--transition-fast);
  user-select: none;
}
.playground-tab:hover { color: var(--text-secondary); }
.playground-tab.active { color: var(--brand); border-bottom-color: var(--brand); }

.line-ref { color: var(--green); font-size: 0.75rem; }
.error-text { color: var(--red); }

@media (max-width: 768px) {
  .playground-wrap { flex-direction: column; }
  .playground-output { width: 100%; min-height: 300px; }
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">
    <span class="logo-icon">y</span>
    <span class="hide-mobile">ysc</span>

<div class="container" style="padding-top:var(--space-6);">

<h2 style="margin-bottom:0.5rem;">Playground</h2>
<p style="color:var(--text-secondary);margin-bottom:var(--space-4);">Write ysc code and press <strong>Run</strong> or <strong>Ctrl+Enter</strong>. Switch between Output, AST, and Bytecode.</p>

<div class="playground-wrap">
  <div class="playground-editor">
    <div class="playground-bar">
      <button class="btn btn-primary" id="runBtn" disabled style="padding:4px 16px;font-size:13px;">▶ Run</button>
      <button class="btn btn-ghost" id="resetBtn" style="padding:4px 12px;font-size:13px;">↺ Reset</button>
      <span class="status" id="status">Loading…</span>
    </div>
    <div id="editor-container"></div>
  </div>
  <div class="playground-output">
    <div class="playground-tabs">
      <span class="playground-tab active" id="tabOut">Output</span>
      <span class="playground-tab" id="tabAst">AST</span>
      <span class="playground-tab" id="tabBc">Bytecode</span>
    </div>
    <pre class="output-content" id="output">Welcome to ysc!

Write code and press ▶ Run.</pre>
  </div>
</div>

</div>

<footer>
  <a href="https://github.com/DevYatsu/ysc">ysc</a> — MIT license. Built with Rust. Compiled to WASM.
</footer>

<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.0/min/vs/loader.js"></script>
<script>
// ── Monarch tokenizer for ysc ──────────────────────────
const yscLanguage = {
  defaultToken: '', tokenPostfix: '.ys', ignoreCase: false,
  keywords: ['fun','ret','if','else','for','while','in','and','or','not',
    'nil','true','false','async','await','exp','use','switch',
    'break','move','except','fail','error','yield'],
  operators: ['+=','-=','*=','/=','%=','+','-','*','/','%',
    '==','!=','<','<=','>','>=','=',':','..','->','|','!',',',';','.'],
  symbols: /[=><!~?:&|+\-*\/^%]+/,
  escapes: /\\(?:[abfnrtv\\"']|x[0-9A-Fa-f]{1,4}|u[0-9A-Fa-f]{4}|U[0-9A-Fa-f]{8})/,
  tokenizer: {
    root: [
      [/\/\/.*$/, 'comment'], [/#.*$/, 'comment'],
      [/"/, { token: 'string.quote', bracket: '@open', next: '@string' }],
      [/\d+[eE][+-]?\d+/, 'number.float'],
      [/\d+\.\d+([eE][+-]?\d+)?/, 'number.float'],
      [/\d+/, 'number'],
      [/[a-zA-Z_$][\w$]*/, { cases: { '@keywords': 'keyword', '@default': 'identifier' } }],
      [/[{}()\[\]]/, '@brackets'], [/[.]/, 'delimiter'], [/[;,.]/, 'delimiter'],
      [/@symbols/, { cases: { '@operators': 'operator', '@default': '' } }],
      { include: '@whitespace' },
    ],
    string: [
      [/[^\\"]+/, 'string'], [/@escapes/, 'string.escape'],
      [/\\./, 'string.escape.invalid'],
      [/"/, { token: 'string.quote', bracket: '@close', next: '@pop' }],
    ],
    whitespace: [[/[ \t\r\n]+/, 'white']],
  },
};

// ── Default code ───────────────────────────────────────
const DEFAULT_CODE = `// ysc — interactive demo

fun fib(n) {
  if n < 2 { ret n }
  else { ret fib(n - 1) + fib(n - 2) }
}

print("fib(10) = " + fib(10))

// Object iteration
obj = {name: "Alice", age: 30, city: "Paris"}
for k in obj {
  print(k + ": " + str(obj[k]))
}

// Range iteration
sum = 0
for i in 0..10 {
  sum = sum + i
}
print("sum 0..9 = " + sum)
`;

// ── Bootstrap ──────────────────────────────────────────
const $out = document.getElementById('output');
const $runBtn = document.getElementById('runBtn');
const $resetBtn = document.getElementById('resetBtn');
const $status = document.getElementById('status');
const $tabOut = document.getElementById('tabOut');
const $tabAst = document.getElementById('tabAst');
const $tabBc = document.getElementById('tabBc');

let editor, wasm, currentTab = 'output', lastOutput = '';

require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.52.0/min/vs' } });

require(['vs/editor/editor.main'], async function () {
  // Register ysc language
  monaco.languages.register({ id: 'ysc' });
  monaco.languages.setMonarchTokensProvider('ysc', yscLanguage);

  // Custom dark theme matching the website
  monaco.editor.defineTheme('ysc-dark', {
    base: 'vs-dark',
    inherit: true,
    rules: [
      { token: 'keyword', foreground: 'ff7b72' },
      { token: 'string', foreground: 'a5d6ff' },
      { token: 'string.quote', foreground: 'a5d6ff' },
      { token: 'number', foreground: '79c0ff' },
      { token: 'number.float', foreground: '79c0ff' },
      { token: 'comment', foreground: '8b949e', fontStyle: 'italic' },
      { token: 'identifier', foreground: 'e6edf3' },
      { token: 'delimiter', foreground: '8b949e' },
      { token: 'operator', foreground: 'ffa657' },
    ],
    colors: {
      'editor.background': '#0d1117',
      'editor.foreground': '#e6edf3',
      'editor.lineHighlightBackground': '#161b22',
      'editor.selectionBackground': '#1c2333',
      'editorCursor.foreground': '#569cd6',
      'editorLineNumber.foreground': '#6e7681',
      'editorIndentGuide.background': '#252d3f',
    },
  });

  // Create editor
  editor = monaco.editor.create(document.getElementById('editor-container'), {
    value: DEFAULT_CODE,
    language: 'ysc',
    theme: 'ysc-dark',
    fontSize: 14,
    lineNumbers: 'on',
    minimap: { enabled: false },
    scrollBeyondLastLine: false,
    automaticLayout: true,
    tabSize: 2,
    wordWrap: 'on',
  });

  // Autocomplete
  monaco.languages.registerCompletionItemProvider('ysc', {
    provideCompletionItems: (model, position) => {
      const range = model.getWordUntilPosition(position);
      const r = { startLineNumber: position.lineNumber, endLineNumber: position.lineNumber,
        startColumn: range.startColumn, endColumn: range.endColumn };
      const kw = ['fun','ret','if','else','for','while','in','and','or','not',
        'nil','true','false','async','await','exp','use','switch','break','move','except','fail','error','yield'];
      const builtins = [
        {label:'print',detail:'print(...values)'},{label:'str',detail:'str(value)'},
        {label:'len',detail:'len(value)'},{label:'time',detail:'time()'},
        {label:'sleep',detail:'sleep(ms)'},{label:'fetch',detail:'fetch(url)'},{label:'spawn',detail:'spawn(fn,...)'}];
      const strM = ['len','upper','lower','trim','starts_with','ends_with','contains',
        'replace','split','repeat','slice','index_of','to_number','is_empty','chars'];
      const numM = ['to_string','ceil','floor','round','abs','sqrt','pow','is_integer','to_int'];
      const objM = ['keys','values','entries','has'];
      const listM = ['map','filter','reduce','each','find','some','every','flat_map',
        'includes','index_of','sorted','reversed','slice','concat','flatten','take','drop','unique'];
      return { suggestions: [
        ...kw.map(k => ({ label: k, kind: monaco.languages.CompletionItemKind.Keyword, insertText: k, range: r })),
        ...builtins.map(f => ({ label: f.label, kind: monaco.languages.CompletionItemKind.Function, insertText: f.label, detail: f.detail, range: r })),
        ...strM.map(m => ({ label: m, kind: monaco.languages.CompletionItemKind.Method, insertText: m, detail: 'string.'+m+'()', range: r })),
        ...numM.map(m => ({ label: m, kind: monaco.languages.CompletionItemKind.Method, insertText: m, detail: 'number.'+m+'()', range: r })),
        ...objM.map(m => ({ label: m, kind: monaco.languages.CompletionItemKind.Method, insertText: m, detail: 'object.'+m+'()', range: r })),
        ...listM.map(m => ({ label: m, kind: monaco.languages.CompletionItemKind.Method, insertText: m, detail: 'list.'+m+'()', range: r })),
      ]};
    },
  });

  // Hover provider
  monaco.languages.registerHoverProvider('ysc', {
    provideHover: (model, position) => {
      const w = model.getWordAtPosition(position);
      if (!w) return null;
      const docs = {
        'fun': 'Declare a function.\n\n```ys\nfun name(params) { body }\n```',
        'ret': 'Return a value.\n\n```ys\nret expr\n```',
        'if': 'Conditional branch.\n\n```ys\nif cond { ... } else { ... }\n```',
        'for': 'Loop over an iterable.\n\n```ys\nfor var in iter { ... }\n```',
        'while': 'Loop while condition is true.',
        'print': 'Output values.\n\n```ys\nprint("hello", 42)\n```',
        'str': 'Convert to string.\n\n```ys\nstr(42) → "42"\n```',
        'len': 'Get length.\n\n```ys\nlen("hi") → 2\n```',
        'yield': 'Generator keyword (future).',
      };
      if (docs[w.word]) return { contents: [{ value: docs[w.word] }] };
      return null;
    },
  });

  // Load WASM
  try {
    const wasmMod = await import('./pkg/ys_wasm.js');
    await wasmMod.default();
    wasm = wasmMod;
    $status.textContent = 'Ready';
    $runBtn.disabled = false;
  } catch (e) {
    $status.textContent = 'Unavailable';
    $out.innerHTML = '<span class="error-text">WASM module not loaded.\n\n' + e.message + '</span>';
  }
});

// ── Tab switching ──────────────────────────────────────
function showTab(tab) {
  currentTab = tab;
  [$tabOut, $tabAst, $tabBc].forEach(t => t.classList.remove('active'));
  if (tab === 'output') { $tabOut.classList.add('active'); $out.innerHTML = lastOutput || ''; }
  if (tab === 'ast') { $tabAst.classList.add('active'); if (wasm && editor) refresh(); }
  if (tab === 'bytecode') { $tabBc.classList.add('active'); if (wasm && editor) refresh(); }
  $out.classList.toggle('is-wrapped', tab !== 'bytecode');
}

$tabOut.onclick = () => showTab('output');
$tabAst.onclick = () => showTab('ast');
$tabBc.onclick = () => showTab('bytecode');

function refresh() {
  if (!wasm || !editor) return;
  try {
    const src = editor.getValue();
    if (currentTab === 'ast') showAst(src);
    else if (currentTab === 'bytecode') showBytecode(src);
  } catch (e) {
    $out.innerHTML = '<span class="error-text">' + escape(e.message) + '</span>';
  }
}

function escape(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function formatLine(l) {
  const val = escape(l.value || '');
  return l.line !== undefined ? '<span class="line-ref">[l.' + l.line + ']</span> ' + val : val;
}

function runCode(src) {
  const r = wasm._eval(src);
  if (r.success) {
    const lines = r.lines || [];
    lastOutput = lines.length ? lines.map(formatLine).join('\n') : '';
  } else {
    let html = '';
    (r.lines || []).forEach(l => { html += formatLine(l) + '\n'; });
    html += '<span class="error-text">' + escape(r.error || 'Error') + '</span>';
    lastOutput = html;
  }
  $out.innerHTML = lastOutput;
}

function showAst(src) {
  const r = wasm._parseAst(src);
  if (r.success) {
    $out.innerHTML = syntaxHighlightJSON(r.data, 0);
  } else {
    $out.innerHTML = '<span class="error-text">' + escape(r.error || 'Error') + '</span>';
  }
}

function showBytecode(src) {
  const r = wasm._disassemble(src);
  if (r.success) {
    let html = '';
    (r.functions || []).forEach(fn => {
      html += '<span style="color:#569cd6;font-weight:600;">fn ' + fn.index + ': ' + escape(fn.name)
        + '</span> <span style="color:#8b949e;">(p=' + fn.params + ', l=' + fn.locals + ')</span>\n';
      (fn.instructions || []).forEach((ins, i) => {
        html += '  <span style="color:#6e7681;">' + String(i).padStart(4) + '</span>: '
          + colorInstruction(ins) + '\n';
      });
      html += '\n';
    });
    html += '<span style="color:#569cd6;font-weight:600;">main</span>\n';
    (r.main || []).forEach((ins, i) => {
      html += '  <span style="color:#6e7681;">' + String(i).padStart(4) + '</span>: '
        + colorInstruction(ins) + '\n';
    });
    $out.innerHTML = html;
  } else {
    $out.innerHTML = '<span class="error-text">' + escape(r.error || 'Error') + '</span>';
  }
}

function colorInstruction(ins) {
  // Color instruction opcodes and operands
  const opcode = ins.match(/^(\w+)/);
  if (!opcode) return escape(ins);
  const rest = ins.slice(opcode[0].length);
  return '<span style="color:#c586c0;">' + opcode[0] + '</span>'
    + rest.replace(/(\b\d+\b)/g, '<span style="color:#79c0ff;">$1</span>')
         .replace(/(:\s*)(Loc\b)/g, '$1<span style="color:#8b949e;">$2</span>');
}

function syntaxHighlightJSON(obj, depth) {
  const indent = '  '.repeat(depth);
  const indent1 = '  '.repeat(depth + 1);
  if (obj === null || obj === undefined) return '<span style="color:#8b949e;">null</span>';
  if (typeof obj === 'string') return '<span style="color:#a5d6ff;">"' + escape(obj) + '"</span>';
  if (typeof obj === 'number') return '<span style="color:#79c0ff;">' + obj + '</span>';
  if (typeof obj === 'boolean') return '<span style="color:#ff7b72;">' + obj + '</span>';
  if (Array.isArray(obj)) {
    if (obj.length === 0) return '[]';
    let html = '[\n';
    obj.forEach((item, i) => {
      html += indent1 + syntaxHighlightJSON(item, depth + 1);
      if (i < obj.length - 1) html += ',';
      html += '\n';
    });
    html += indent + ']';
    return html;
  }
  if (typeof obj === 'object') {
    const keys = Object.keys(obj);
    if (keys.length === 0) return '{}';
    let html = '{\n';
    keys.forEach((key, i) => {
      const val = obj[key];
      const keyColor = key === 'type' ? '#569cd6' : '#d2a8ff';
      html += indent1 + '<span style="color:' + keyColor + ';">' + key + '</span>: ' + syntaxHighlightJSON(val, depth + 1);
      if (i < keys.length - 1) html += ',';
      html += '\n';
    });
    html += indent + '}';
    return html;
  }
  return escape(String(obj));
}

$runBtn.onclick = () => { showTab('output'); if (editor) runCode(editor.getValue()); };
$resetBtn.onclick = () => { if (editor) editor.setValue(DEFAULT_CODE); };
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault(); $runBtn.click();
  }
});
</script>
</body>
</html>
